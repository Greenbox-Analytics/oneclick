version: '3'

vars:
  GCP_PROJECT: msanii-484501
  BACKEND_DIR: src/backend

dotenv: ['.env']

tasks:
  install:
    desc: Install all dependencies (Poetry + npm) and export requirements.txt
    cmds:
      - task: install:backend
      - task: install:frontend

  install:backend:
    desc: Install Python backend dependencies via Poetry
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - poetry install --no-interaction
      - poetry export -f requirements.txt --output requirements.txt --without-hashes
    sources:
      - pyproject.toml
      - poetry.lock
    generates:
      - requirements.txt

  install:frontend:
    desc: Install Node.js frontend dependencies
    cmds:
      - npm ci
    sources:
      - package-lock.json

  setup:
    desc: Install all dependencies and pull secrets from GSM
    cmds:
      - task: install
      - task: setup:secrets

  setup:secrets:
    desc: Pull secrets from GSM into .env (alias for setup:secrets:dev)
    cmds:
      - task: setup:secrets:dev

  setup:secrets:dev:
    desc: |
      Merge DEV-flavored secrets from GSM into .env (Stripe test mode, dev PostHog).
      Additive only: keys with a live (uncommented, non-empty) value in .env are preserved;
      keys missing, commented out, or empty get filled from GSM.
    cmds:
      - task: _setup:secrets:internal
        vars:
          ENV_SUFFIX: DEV
          BYPASS_PAYWALLS: "false"
          POSTHOG_ENABLED: "false"
          FRONTEND_URL: "http://localhost:8080"
          VITE_BACKEND_API_URL: "http://localhost:8000"

  setup:secrets:prod:
    desc: |
      Merge PROD-flavored secrets from GSM into .env (Stripe LIVE mode, prod PostHog).
      Additive only: existing live values in .env are preserved.
      Use with care — never run a local dev server with prod Stripe keys against prod data.
      To do a clean refill, run setup:secrets:reset:prod instead.
    prompt: Merge PROD secrets (Stripe LIVE keys) into .env? Continue?
    cmds:
      - task: _setup:secrets:internal
        vars:
          ENV_SUFFIX: PROD
          BYPASS_PAYWALLS: "false"
          POSTHOG_ENABLED: "false"
          FRONTEND_URL: "https://app.msanii.com"
          VITE_BACKEND_API_URL: "https://msanii-backend-529844341368.northamerica-northeast2.run.app"

  setup:secrets:reset:dev:
    desc: |
      DESTRUCTIVE: replace .env entirely with DEV-flavored GSM secrets.
      Your current .env is backed up to .env.backup (gitignored) before deletion.
      Use when you want a clean slate; otherwise prefer the additive setup:secrets:dev.
    prompt: This will DELETE your .env and refill with DEV secrets. Continue?
    cmds:
      - task: _setup:secrets:reset-env-file
      - task: setup:secrets:dev

  setup:secrets:reset:prod:
    desc: |
      DESTRUCTIVE: replace .env entirely with PROD-flavored GSM secrets (Stripe LIVE).
      Your current .env is backed up to .env.backup (gitignored) before deletion.
      Use when you want a clean slate; otherwise prefer the additive setup:secrets:prod.
    prompt: This will DELETE your .env and refill with PROD secrets (Stripe LIVE). Continue?
    cmds:
      - task: _setup:secrets:reset-env-file
      - task: _setup:secrets:internal
        vars:
          ENV_SUFFIX: PROD
          BYPASS_PAYWALLS: "false"
          POSTHOG_ENABLED: "false"
          FRONTEND_URL: "https://app.msanii.com"
          VITE_BACKEND_API_URL: "https://msanii-backend-529844341368.northamerica-northeast2.run.app"

  _setup:secrets:reset-env-file:
    desc: Internal — back up and delete .env. Used by setup:secrets:reset:* tasks.
    internal: true
    cmds:
      - |
        if [[ -f .env ]]; then
          cp .env .env.backup
          echo "Backed up current .env to .env.backup ($(wc -l < .env | tr -d ' ') lines)"
          rm .env
          echo "Deleted .env"
        else
          echo "No .env to back up"
        fi

  _setup:secrets:internal:
    desc: Internal — do not call directly. Use setup:secrets:dev or setup:secrets:prod.
    internal: true
    preconditions:
      - sh: gcloud auth print-identity-token > /dev/null 2>&1
        msg: |
          Not authenticated with gcloud. Run:
            gcloud auth login --update-adc
            gcloud config set project {{.GCP_PROJECT}}
      - sh: '[[ "{{.ENV_SUFFIX}}" == "DEV" || "{{.ENV_SUFFIX}}" == "PROD" ]]'
        msg: ENV_SUFFIX must be DEV or PROD
    cmds:
      - |
        echo "Merging {{.ENV_SUFFIX}} secrets from GSM into .env (project: {{.GCP_PROJECT}})..."
        echo "Legend:  ✓ added   ◌ kept your local value   ✗ not in GSM"
        touch .env

        # True if KEY has an uncommented, non-empty value in .env.
        # Handles all of these formats as "live":
        #   KEY=value
        #   KEY = value          (whitespace around =)
        #     KEY=value          (leading whitespace)
        # Treated as "missing" (will be filled from GSM/literal):
        #   # KEY=value          (commented out)
        #   KEY=                 (empty value)
        #   KEY =                (empty with whitespace)
        has_live_entry() {
          local key="$1"
          grep -qE "^[[:space:]]*${key}[[:space:]]*=[[:space:]]*[^[:space:]#]" .env
        }

        # ---- Section machinery ----
        # Each "section" buffers its additions in PENDING_LINES. end_section()
        # emits the section header + buffered lines to .env, but only if at
        # least one key was added (so re-runs don't produce empty headers).
        PENDING_LINES=()
        CURRENT_SECTION_TITLE=""

        start_section() {
          CURRENT_SECTION_TITLE="$1"
          PENDING_LINES=()
          echo
          echo "[$CURRENT_SECTION_TITLE]"
        }

        end_section() {
          if (( ${#PENDING_LINES[@]} == 0 )); then
            return
          fi
          {
            echo ""
            echo "# ============================================================================"
            echo "# ${CURRENT_SECTION_TITLE}"
            echo "# ============================================================================"
            for line in "${PENDING_LINES[@]}"; do
              echo "$line"
            done
          } >> .env
          PENDING_LINES=()
        }

        # Try a shared GSM secret (GSM name == env-var name)
        try_gsm() {
          local key="$1"
          if has_live_entry "$key"; then
            echo "  ◌ $key"
            return
          fi
          local value
          if value=$(gcloud secrets versions access latest --secret="$key" --project="{{.GCP_PROJECT}}" 2>/dev/null); then
            PENDING_LINES+=("${key}=${value}")
            echo "  ✓ $key"
          else
            echo "  ✗ $key (not in GSM or no access)"
          fi
        }

        # Try an env-scoped GSM secret (GSM stores NAME_DEV / NAME_PROD; written as NAME)
        try_gsm_scoped() {
          local base="$1"
          if has_live_entry "$base"; then
            echo "  ◌ $base"
            return
          fi
          local gsm_name="${base}_{{.ENV_SUFFIX}}"
          local value
          if value=$(gcloud secrets versions access latest --secret="$gsm_name" --project="{{.GCP_PROJECT}}" 2>/dev/null); then
            PENDING_LINES+=("${base}=${value}")
            echo "  ✓ $base (from $gsm_name)"
          else
            echo "  ✗ $gsm_name (not in GSM or no access)"
          fi
        }

        # Literal value (env-specific config, not from GSM)
        try_literal() {
          local key="$1"
          local value="$2"
          if has_live_entry "$key"; then
            echo "  ◌ $key"
            return
          fi
          PENDING_LINES+=("${key}=${value}")
          echo "  ✓ $key"
        }

        # ============ Sections (mirror docs/.env.example structure) ============

        start_section "SUPABASE"
        try_gsm "VITE_SUPABASE_URL"
        try_gsm "VITE_SUPABASE_ANON_KEY"
        try_gsm "VITE_SUPABASE_SECRET_KEY"
        try_gsm "DATABASE_PW"
        end_section

        start_section "OPENAI API KEYS"
        try_gsm "OPENAI_API_KEY"
        try_gsm "OPENAI_LLM_MODEL"
        try_gsm "OPENAI_LLM_MODEL_LARGE"
        end_section

        start_section "ENCRYPTION KEYS & SECRETS"
        try_gsm "INTEGRATION_ENCRYPTION_KEY"
        try_gsm "INTEGRATION_OAUTH_STATE_SECRET"
        try_gsm "CREDENTIALS_AES_KEY"
        end_section

        start_section "GOOGLE DRIVE AUTH MSANII BACKEND"
        try_gsm "GOOGLE_DRIVE_CLIENT_ID"
        try_gsm "GOOGLE_DRIVE_CLIENT_SECRET"
        end_section

        start_section "SLACK INTEGRATION"
        try_gsm "SLACK_CLIENT_ID"
        try_gsm "SLACK_CLIENT_SECRET"
        end_section

        start_section "NOTION INTEGRATION"
        try_gsm "NOTION_CLIENT_ID"
        try_gsm "NOTION_CLIENT_SECRET"
        end_section

        start_section "POSTHOG"
        try_literal "POSTHOG_ENABLED" "{{.POSTHOG_ENABLED}}"
        try_gsm "POSTHOG_PROJECT_TOKEN"
        try_literal "POSTHOG_HOST" "https://us.i.posthog.com"
        try_gsm "POSTHOG_PERSONAL_API_KEY"
        try_gsm "POSTHOG_PROJECT_ID"
        end_section

        start_section "STRIPE INTEGRATION"
        try_gsm_scoped "STRIPE_SECRET_KEY"
        try_gsm_scoped "STRIPE_WEBHOOK_SECRET"
        try_gsm "STRIPE_PRICE_MONTHLY"
        try_gsm "STRIPE_PRICE_ANNUAL"
        end_section

        start_section "RESEND SMTP"
        try_gsm "RESEND_API_KEY"
        try_gsm "RESEND_FROM_EMAIL"
        end_section

        start_section "LOCAL TESTING VARS & LOCAL ADMIN RIGHTS"
        try_gsm "ADMIN_EMAILS"
        try_gsm "TESTER_EMAILS"
        try_gsm_scoped "VITE_APP_ENV"
        try_literal "OPS_NOTIFICATION_EMAIL" "tech@greenboxanalytics.ca"
        try_literal "BYPASS_PAYWALLS" "{{.BYPASS_PAYWALLS}}"
        try_literal "FRONTEND_URL" "{{.FRONTEND_URL}}"
        try_literal "VITE_FRONTEND_URL" "{{.FRONTEND_URL}}"
        try_literal "VITE_BACKEND_API_URL" "{{.VITE_BACKEND_API_URL}}"
        try_literal "ALLOWED_ORIGINS" "{{.FRONTEND_URL}}"
        end_section

        echo
        echo "Done. .env now has $(wc -l < .env | tr -d ' ') lines."
        echo "Tip: to fully reset .env, run 'task setup:secrets:reset:dev' (backs up first)."

  test:
    desc: Run all backend tests
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - poetry run pytest -v {{.CLI_ARGS}}

  test:health:
    desc: Run health/smoke tests
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - poetry run pytest tests/test_health.py -v {{.CLI_ARGS}}

  test:artists:
    desc: Run artist endpoint tests
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - poetry run pytest tests/test_artists.py -v {{.CLI_ARGS}}

  test:projects:
    desc: Run project endpoint tests
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - poetry run pytest tests/test_projects.py -v {{.CLI_ARGS}}

  test:registry:
    desc: Run all registry tests (works, stakes, licenses, collaborators)
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - poetry run pytest tests/test_registry_*.py -v {{.CLI_ARGS}}

  test:boards:
    desc: Run kanban board tests
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - poetry run pytest tests/test_boards.py -v {{.CLI_ARGS}}

  test:settings:
    desc: Run workspace settings tests
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - poetry run pytest tests/test_settings.py -v {{.CLI_ARGS}}

  test:members:
    desc: Run project member tests
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - poetry run pytest tests/test_project_members.py -v {{.CLI_ARGS}}

  test:splitsheet:
    desc: Run split sheet generation tests
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - poetry run pytest tests/test_splitsheet.py -v {{.CLI_ARGS}}

  test:files:
    desc: Run file management tests
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - poetry run pytest tests/test_files.py -v {{.CLI_ARGS}}

  test:notes:
    desc: Run notes and folders tests
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - poetry run pytest tests/test_notes.py -v {{.CLI_ARGS}}

  test:notifications:
    desc: Run notification tests
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - poetry run pytest tests/test_notifications.py -v {{.CLI_ARGS}}

  test:teamcard:
    desc: Run team card tests
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - poetry run pytest tests/test_teamcard.py -v {{.CLI_ARGS}}

  test:zoe:
    desc: Run Zoe AI chatbot tests
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - poetry run pytest tests/test_zoe.py -v {{.CLI_ARGS}}

  test:oneclick:
    desc: Run OneClick royalty calculator tests
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - poetry run pytest tests/test_oneclick.py -v {{.CLI_ARGS}}

  lint:
    desc: Run all linters (ruff + ESLint)
    cmds:
      - task: lint:backend
      - task: lint:frontend

  lint:backend:
    desc: Run ruff lint and format check on backend
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - poetry run ruff check .
      - poetry run ruff format --check .

  lint:frontend:
    desc: Run ESLint on frontend
    cmds:
      - npm run lint

  format:
    desc: Auto-fix formatting (ruff + ESLint)
    cmds:
      - task: format:backend
      - task: format:frontend

  format:backend:
    desc: Auto-fix Python formatting with ruff
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - poetry run ruff format .
      - poetry run ruff check --fix .

  format:frontend:
    desc: Auto-fix JS/TS formatting with ESLint
    cmds:
      - npx eslint . --fix

  ci:
    desc: Run full CI pipeline locally (lint + test + build)
    cmds:
      - task: lint
      - task: test
      - npm run build
    env:
      VITE_SUPABASE_URL: '{{.VITE_SUPABASE_URL | default "https://placeholder.supabase.co"}}'
      VITE_SUPABASE_ANON_KEY: '{{.VITE_SUPABASE_ANON_KEY | default "placeholder"}}'
      VITE_BACKEND_API_URL: '{{.VITE_BACKEND_API_URL | default "https://placeholder.example.com"}}'

  dev:
    desc: Start both frontend and backend dev servers
    deps: [dev:backend, dev:frontend]

  dev:backend:
    desc: Start FastAPI backend server
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - poetry run uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  dev:frontend:
    desc: Start Vite frontend dev server
    cmds:
      - npm run dev
