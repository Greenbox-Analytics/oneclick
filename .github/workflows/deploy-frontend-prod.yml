name: Deploy Prod Frontend to Vercel

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  VERCEL_TOKEN: ${{ secrets.VERCEL_PROD_TOKEN }}
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    name: Build and Deploy Prod Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install -g vercel@44.2.7

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ env.VERCEL_TOKEN }}

      - name: Build for production
        run: vercel build --prod --token=${{ env.VERCEL_TOKEN }}

      - name: Deploy to production
        id: deploy
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=${{ env.VERCEL_TOKEN }})
          echo "Deployed to: $DEPLOY_URL"
          echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT

      - name: Deployment Summary
        run: |
          echo "✅ Prod frontend deployment successful!"
          echo "🌐 URL: ${{ steps.deploy.outputs.url }}"
          echo "🏷️ Tag: ${{ github.ref_name }}"
