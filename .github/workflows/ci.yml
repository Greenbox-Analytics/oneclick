name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Poetry
        run: |
          pip install poetry
          poetry config virtualenvs.in-project true
      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: src/backend/.venv
          key: poetry-${{ runner.os }}-${{ hashFiles('src/backend/poetry.lock') }}
      - name: Install dependencies
        run: poetry install --no-interaction
      - name: Verify requirements.txt is in sync with poetry.lock
        # The container deploy uses `pip install -r requirements.txt`, not poetry.
        # If requirements.txt drifts from pyproject.toml / poetry.lock, the
        # deployed container is missing packages and uvicorn crashes on import
        # (e.g., ModuleNotFoundError: 'posthog'). Re-export here and fail the
        # PR if it doesn't match what's committed.
        run: |
          poetry export -f requirements.txt --without-hashes --output /tmp/requirements.expected
          if ! diff -u requirements.txt /tmp/requirements.expected; then
            echo "::error::requirements.txt is out of sync with pyproject.toml / poetry.lock."
            echo "::error::Run 'task install:backend' (or 'cd src/backend && poetry export -f requirements.txt --output requirements.txt --without-hashes') and commit the result."
            exit 1
          fi
      - name: Ruff lint
        run: poetry run ruff check .
      - name: Ruff format check
        run: poetry run ruff format --check .
      - name: Run tests
        run: poetry run pytest -v --tb=short
        env:
          VITE_SUPABASE_URL: "https://fake.supabase.co"
          VITE_SUPABASE_SECRET_KEY: "fake-key-for-ci"
          OPENAI_API_KEY: "fake-key-for-ci"
          RESEND_API_KEY: "fake-key-for-ci"

  frontend:
    name: Frontend (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: ESLint
        run: npm run lint
      - name: TypeScript build check
        run: npm run build
        env:
          VITE_SUPABASE_URL: "https://fake.supabase.co"
          VITE_SUPABASE_ANON_KEY: "fake-key-for-ci"
          VITE_BACKEND_API_URL: "https://fake-backend.example.com"
