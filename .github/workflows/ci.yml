name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Needed so the test-reporter can publish a check run with the results.
permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  # Detect which side of the repo the diff touches so PRs only run the suites
  # they can affect. Job-level `if` (not workflow-level `paths:`) on purpose:
  # a job skipped by `if` still reports a conclusion, so branch-protection
  # required checks stay satisfied — workflow-level paths would leave required
  # checks pending forever on filtered-out PRs.
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'src/backend/**'
              - '.github/workflows/ci.yml'
            # Fail-open: anything that is not clearly backend-only, migrations,
            # or docs counts as frontend. When in doubt, the suite runs.
            frontend:
              - '**'
              - '!src/backend/**'
              - '!supabase/**'
              - '!docs/**'
              - '!**.md'

  backend:
    name: Backend (Python)
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Poetry
        run: |
          pip install poetry
          poetry config virtualenvs.in-project true
      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: src/backend/.venv
          key: poetry-${{ runner.os }}-${{ hashFiles('src/backend/poetry.lock') }}
      - name: Install dependencies
        run: poetry install --no-interaction
      - name: Ruff lint
        run: poetry run ruff check .
      - name: Ruff format check
        run: poetry run ruff format --check .
      - name: Run tests
        run: poetry run pytest -v --tb=short --junitxml=junit.xml
        env:
          VITE_SUPABASE_URL: "https://fake.supabase.co"
          VITE_SUPABASE_SECRET_KEY: "fake-key-for-ci"
          OPENAI_API_KEY: "fake-key-for-ci"
          RESEND_API_KEY: "fake-key-for-ci"
      - name: Publish test report
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        if: always() # run even when tests fail, so failures show up in the report
        with:
          name: Backend Test Report
          path: src/backend/junit.xml
          reporter: java-junit

  frontend:
    name: Frontend (TypeScript)
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: ESLint
        run: npm run lint
      - name: TypeScript build check
        run: npm run build
        env:
          VITE_SUPABASE_URL: "https://fake.supabase.co"
          VITE_SUPABASE_ANON_KEY: "fake-key-for-ci"
          VITE_BACKEND_API_URL: "https://fake-backend.example.com"
      - name: Unit tests
        run: npm run test
      - name: Publish frontend test report
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        if: always() # run even when tests fail, so failures show up in the report
        with:
          name: Frontend Test Report
          path: junit.xml
          reporter: java-junit
